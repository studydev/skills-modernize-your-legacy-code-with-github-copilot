name: Step 0 # 실습 시작

on:
  push:
    branches:
      - main

permissions:
  contents: write
  actions: write
  issues: write

env:
  STEP_1_FILE: ".github/steps/1-preparing.md"

jobs:
  start_exercise:
    if: |
      !github.event.repository.is_template
    name: 실습 시작
    uses: skills-kr/exercise-toolkit/.github/workflows/start-exercise.yml@kr-v0.6.0
    with:
      exercise-title: "Copilot으로 레거시 코드 현대화"
      intro-message: "GitHub Copilot을 사용하여 레거시 COBOL 회계 시스템을 현대화하는 방법을 배워봅시다."

  post_next_step_content:
    name: 다음 단계 내용 게시
    runs-on: ubuntu-latest
    needs: [start_exercise]
    env:
      ISSUE_NUMBER: ${{ needs.start_exercise.outputs.issue-number }}
      ISSUE_REPOSITORY: ${{ github.repository }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: main

      - name: 응답 템플릿 가져오기
        uses: actions/checkout@v4
        with:
          repository: skills-kr/exercise-toolkit
          path: exercise-toolkit
          ref: kr-v0.6.0

      - name: 댓글 생성 - 단계 내용 추가
        uses: GrantBirki/comment@v2.1.1
        with:
          repository: ${{ env.ISSUE_REPOSITORY }}
          issue-number: ${{ env.ISSUE_NUMBER }}
          file: ${{ env.STEP_1_FILE }}
          vars: |
            login: ${{ github.actor }}
            full_repo_name: ${{ github.repository }}

      - name: 댓글 생성 - 진행 상황 감시
        uses: GrantBirki/comment@v2.1.1
        with:
          repository: ${{ env.ISSUE_REPOSITORY }}
          issue-number: ${{ env.ISSUE_NUMBER }}
          file: exercise-toolkit/markdown-templates/step-feedback/watching-for-progress.md

      - name: 다음 단계 워크플로우 활성화
        run: |
          gh workflow enable "Step 1"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Workshop Tracker에 시작 보고
        if: success()
        continue-on-error: true
        run: |
          SESSION_ID=$(jq -r '.sessionId' .github/workshop-config.json)
          TRACK=$(jq -r '.track' .github/workshop-config.json)
          API_URL=$(jq -r '.apiUrl' .github/workshop-config.json)
          curl -s -X POST "$API_URL" \
            -H "Content-Type: application/json" \
            -d '{"sessionId": "'"$SESSION_ID"'", "type": "start", "step": 0, "description": "실습 시작", "username": "'"$GITHUB_ACTOR"'", "repo": "'"$GITHUB_REPOSITORY"'", "track": "'"$TRACK"'", "runId": "'"$GITHUB_RUN_ID"'"}' || true
